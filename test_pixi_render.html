      "target": "vit_encoder",
      "type": "skip_connection",
      "advanced": {
        "semanticType": "gradient_flow",
        "lineStyle": "dashed",
        "strokeColor": "#E57373",
        "crossesGroupBoundary": true,
        "edgeLabels": [
          {
            "text": "backprop",
            "position": 0.5
          }
        ]
      }
    },
    {
      "id": "e12",
      "source": "loss_training",
      "target": "transformer_decoder",
      "type": "skip_connection",
      "advanced": {
        "semanticType": "gradient_flow",
        "lineStyle": "dashed",
        "strokeColor": "#E57373",
        "crossesGroupBoundary": true
      }
    },
    {
      "id": "e13",
      "source": "ram_resource",
      "target": "stage1_group",
      "type": "normal",
      "advanced": {
        "semanticType": "optional_path",
        "lineStyle": "dotted",
        "strokeColor": "#9E9E9E"
      }
    },
    {
      "id": "e14",
      "source": "ram_resource",
      "target": "stage2_group",
      "type": "normal",
      "advanced": {
        "semanticType": "optional_path",
        "lineStyle": "dotted",
        "strokeColor": "#9E9E9E"
      }
    },
    {
      "id": "e15",
      "source": "input_image",
      "target": "local_images",
      "type": "skip_connection",
      "advanced": {
        "semanticType": "skip_connection",
        "routing": "SPLINES",
        "curvature": 0.8,
        "strokeColor": "#4CAF50",
        "crossesGroupBoundary": true,
        "edgeLabels": [
          {
            "text": "crop regions",
            "position": 0.5
          }
        ]
      }
    }
  ],
  "canvas": {
    "w": 2064,
    "h": 3977
  }
};
const CELLS = DATA.cells;
const EDGES = DATA.edges;
const CANVAS_W = DATA.canvas.w + 200;
const CANVAS_H = DATA.canvas.h + 200;

// ── Species colours ─────────────────────────────────────────────────────────
const COLS = {
  'cil-eye':         { fill: 0x5C6BC0, stroke: 0x3949AB, glow: 0x7986CB },
  'cil-vector':      { fill: 0x66BB6A, stroke: 0x388E3C, glow: 0x81C784 },
  'cil-bolt':        { fill: 0xFFA726, stroke: 0xF57C00, glow: 0xFFCC80 },
  'cil-plus':        { fill: 0xEC407A, stroke: 0xC62828, glow: 0xF48FB1 },
  'cil-arrow-right': { fill: 0x78909C, stroke: 0x455A64, glow: 0xB0BEC5 },
  'cil-filter':      { fill: 0xAB47BC, stroke: 0x7B1FA2, glow: 0xCE93D8 },
  'cil-code':        { fill: 0x26A69A, stroke: 0x00796B, glow: 0x80CBC4 },
  'cil-layers':      { fill: 0x42A5F5, stroke: 0x1565C0, glow: 0x90CAF9 },
  'cil-loop':        { fill: 0xFFCA28, stroke: 0xF9A825, glow: 0xFFE082 },
  'cil-graph':       { fill: 0x78909C, stroke: 0x37474F, glow: 0xB0BEC5 },
};
function gc(s) { return COLS[s] || COLS['cil-code']; }

// ── Build cell map ──────────────────────────────────────────────────────────
const cellMap = {};
CELLS.forEach(c => cellMap[c.cell_id] = c);

// ── App init ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
canvas.width = Math.min(CANVAS_W, 2200);
canvas.height = Math.min(CANVAS_H, 4200);
const app = new Application();

let currentMode = 'pixi';

async function initApp() {
  await app.init({
    canvas,
    width: canvas.width, height: canvas.height,
    backgroundColor: 0x0D1117,
    antialias: true,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
    autoDensity: true,
  });
  app.stage.sortableChildren = true;
  renderPixi();
  document.getElementById('info').textContent =
    `${CELLS.length} cells, ${EDGES.length} edges, ${canvas.width}×${canvas.height}px — Mode: PixiJS Graphics`;
}

// ══════════════════════════════════════════════════════════════════════════════
// METHOD 1: PixiJS Graphics
// ══════════════════════════════════════════════════════════════════════════════
function renderPixi() {
  app.stage.removeChildren();
  app.stage.sortableChildren = true;

  // Scale to fit
  const scale = Math.min(canvas.width / CANVAS_W, canvas.height / CANVAS_H, 0.85);
  const root = new Container();
  root.scale.set(scale);
  root.position.set(50, 50);
  app.stage.addChild(root);

  // Edges layer (z=1)
  const edgeG = new Graphics();
  edgeG.zIndex = 1;
  for (const e of EDGES) {
    const src = cellMap[e.source], tgt = cellMap[e.target];
    if (!src || !tgt) continue;
    const sx = src.bbox.x + src.bbox.w/2, sy = src.bbox.y + src.bbox.h;
    const tx = tgt.bbox.x + tgt.bbox.w/2, ty = tgt.bbox.y;
    const adv = e.advanced || {};
    const col = adv.strokeColor ? parseInt(adv.strokeColor.replace('#',''), 16) : 0x555555;
    const dash = adv.lineStyle === 'dashed' || adv.lineStyle === 'dotted';

    const my = (sy + ty) / 2;
    edgeG.moveTo(sx, sy);
    if (e.type === 'skip_connection') {
      const cx = Math.max(sx, tx) + 60;
      edgeG.bezierCurveTo(cx, sy, cx, ty, tx, ty);
    } else {
      edgeG.bezierCurveTo(sx, my, tx, my, tx, ty);
    }
    edgeG.stroke({ color: col, width: dash ? 1 : 1.5, alpha: 0.5 });

    // Arrowhead
    const a = Math.atan2(ty - my, tx - tx) || -Math.PI/2;
    edgeG.moveTo(tx - 5, ty - 8); edgeG.lineTo(tx, ty); edgeG.lineTo(tx + 5, ty - 8);
    edgeG.stroke({ color: col, width: 1.5, alpha: 0.5 });
  }
  root.addChild(edgeG);

  // Cells
  for (const c of CELLS) {
    const col = gc(c.species);
    const cont = new Container();
    cont.position.set(c.bbox.x, c.bbox.y);
    cont.zIndex = c.z;

    if (c.is_group) {
      // Group: dashed border, semi-transparent fill
      const bg = new Graphics();
      bg.roundRect(0, 0, c.bbox.w, c.bbox.h, 10);
      bg.fill({ color: col.fill, alpha: 0.06 });
      bg.roundRect(0, 0, c.bbox.w, c.bbox.h, 10);
      bg.stroke({ color: col.stroke, width: 1, alpha: 0.25 });
      cont.addChild(bg);
      // Group label
      const t = new Text({ text: c.label, style: new TextStyle({
        fontSize: 11, fill: col.stroke, fontWeight: '600', fontFamily: 'system-ui' }) });
      t.position.set(12, 8);
      cont.addChild(t);
    } else {
      // Glow
      const glow = new Graphics();
      glow.roundRect(-12, -12, c.bbox.w+24, c.bbox.h+24, 14);
      glow.fill({ color: col.glow, alpha: 0.15 });
      glow.filters = [new BlurFilter({ strength: 8, quality: 3 })];
      cont.addChild(glow);

      // Body
      const body = new Graphics();
      body.roundRect(0, 0, c.bbox.w, c.bbox.h, 8);
      body.fill({ color: col.fill, alpha: 0.85 });
      body.roundRect(0, 0, c.bbox.w, c.bbox.h, 8);
      body.stroke({ color: col.stroke, width: 1.5, alpha: 0.7 });
      cont.addChild(body);

      // Label
      const t = new Text({ text: c.label, style: new TextStyle({
        fontSize: 11, fill: 0xFFFFFF, fontWeight: '500', fontFamily: 'system-ui',
        wordWrap: true, wordWrapWidth: c.bbox.w - 16 }) });
      t.anchor.set(0.5);
      t.position.set(c.bbox.w/2, c.bbox.h/2);
      cont.addChild(t);
    }
    root.addChild(cont);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// METHOD 3: SDF Shader
// ══════════════════════════════════════════════════════════════════════════════
const SDF_VERT = `
attribute vec2 aPosition;
attribute vec2 aUV;
varying vec2 vUV;
void main() { vUV = aUV; gl_Position = vec4(aPosition, 0.0, 1.0); }
`;

const SDF_FRAG = `
precision highp float;
varying vec2 vUV;
uniform vec2 uSize;
uniform vec3 uFill;
uniform vec3 uGlow;
uniform float uRadius;
uniform int uSpecies;

float sdRoundBox(vec2 p, vec2 b, float r) {
  vec2 q = abs(p) - b + r;
  return length(max(q, 0.0)) + min(max(q.x, q.y), 0.0) - r;
}

void main() {
  vec2 uv = (vUV - 0.5) * (uSize + 40.0);
  float d = sdRoundBox(uv, uSize * 0.5 - 1.0, uRadius);
  float fill = smoothstep(1.0, -1.0, d);
  float stroke = smoothstep(2.0, 0.5, abs(d)) * 0.7;
  float glow = exp(-d * d * 0.005) * 0.25;
  vec3 col = uGlow * glow;
  col = mix(col, uFill, fill);
  col = mix(col, uFill * 0.6, stroke);
  float a = max(glow, max(fill, stroke));
  gl_FragColor = vec4(col, a);
}
`;

function renderSDF() {
  app.stage.removeChildren();
  app.stage.sortableChildren = true;

  const scale = Math.min(canvas.width / CANVAS_W, canvas.height / CANVAS_H, 0.85);
  const root = new Container();
  root.scale.set(scale);
  root.position.set(50, 50);
  app.stage.addChild(root);

  for (const c of CELLS) {
    if (c.is_group) continue; // Skip groups in SDF mode for clarity
    const col = gc(c.species);
    const pad = 20;

    // Normalize coords to clip space
    const x0 = -1 + 2*(c.bbox.x - pad) / CANVAS_W;
    const y0 = 1 - 2*(c.bbox.y - pad) / CANVAS_H;
    const x1 = -1 + 2*(c.bbox.x + c.bbox.w + pad) / CANVAS_W;
    const y1 = 1 - 2*(c.bbox.y + c.bbox.h + pad) / CANVAS_H;

    try {
      const geo = new MeshGeometry({
        positions: new Float32Array([x0,y0, x1,y0, x1,y1, x0,y1]),
        uvs: new Float32Array([0,0, 1,0, 1,1, 0,1]),
        indices: new Uint32Array([0,1,2, 0,2,3]),
      });

      const fillR = ((col.fill >> 16) & 0xFF) / 255;
      const fillG = ((col.fill >> 8) & 0xFF) / 255;
      const fillB = (col.fill & 0xFF) / 255;
      const glowR = ((col.glow >> 16) & 0xFF) / 255;
      const glowG = ((col.glow >> 8) & 0xFF) / 255;
      const glowB = (col.glow & 0xFF) / 255;

      const shader = Shader.from({
        gl: { vertex: SDF_VERT, fragment: SDF_FRAG },
        resources: {
          uniforms: new UniformGroup({
            uSize: { value: new Float32Array([c.bbox.w, c.bbox.h]), type: 'vec2<f32>' },
            uFill: { value: new Float32Array([fillR, fillG, fillB]), type: 'vec3<f32>' },
            uGlow: { value: new Float32Array([glowR, glowG, glowB]), type: 'vec3<f32>' },
            uRadius: { value: 8.0, type: 'f32' },
            uSpecies: { value: 0, type: 'i32' },
          })
        }
      });

      const mesh = new Mesh({ geometry: geo, shader });
      mesh.zIndex = c.z;
      root.addChild(mesh);
    } catch(e) {
      // Fallback to Graphics if SDF fails
      const g = new Graphics();
      g.roundRect(c.bbox.x, c.bbox.y, c.bbox.w, c.bbox.h, 8);
      g.fill({ color: col.fill, alpha: 0.85 });
      g.stroke({ color: col.stroke, width: 1.5 });
      g.zIndex = c.z;
      root.addChild(g);
    }

    // Label
    const t = new Text({ text: c.label, style: new TextStyle({
      fontSize: 10, fill: 0xFFFFFF, fontWeight: '500', fontFamily: 'system-ui' }) });
    t.anchor.set(0.5);
    t.position.set(c.bbox.x + c.bbox.w/2, c.bbox.y + c.bbox.h/2);
    t.zIndex = c.z + 1;
    root.addChild(t);
  }
}

// ── Mode switcher ───────────────────────────────────────────────────────────
let _stopMotion = null; // handle to cancel in-progress animation

window.switchMode = function(mode) {
  // Stop any running animation
  if (_stopMotion) { _stopMotion(); _stopMotion = null; }
  currentMode = mode;
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  if (mode === 'pixi') { renderPixi(); }
  else if (mode === 'sdf') { renderSDF(); }
  else if (mode === 'animate') { _stopMotion = renderAnimate(); }
  const modeLabel = mode === 'pixi' ? 'PixiJS Graphics'
                  : mode === 'sdf'  ? 'SDF Shader'
                  : '⚡ Physics Animation';
  document.getElementById('info').textContent =
    `${CELLS.length} cells, ${EDGES.length} edges — Mode: ${modeLabel}`;
};

// ════════════════════════════════════════════════════════════════════════════
// PHYSICS ANIMATION — spring-force + repulsion + damping convergence
// Mirrors src/lib/renderers/pixi-cell-motion.ts (inline for HTML standalone)
// ════════════════════════════════════════════════════════════════════════════

const PHYS = {
  DAMPING:         0.95,
  K_SPRING:        0.01,
  K_EDGE:          0.005,
  REPULSION_R:     200,
  REPULSION_K:     3000,
  CONVERGE_EPS:    0.15,
  CONVERGE_FRAMES: 30,
};

function renderAnimate() {
  app.stage.removeChildren();
  app.stage.sortableChildren = true;

  const scale = Math.min(canvas.width / CANVAS_W, canvas.height / CANVAS_H, 0.85);
  const root = new Container();
  root.scale.set(scale);
  root.position.set(50, 50);
  app.stage.addChild(root);

  // Edge graphics layer (drawn behind cells)
  const edgeGfx = new Graphics();
  edgeGfx.zIndex = 0;
  root.addChild(edgeGfx);

  // ── Build particles (leaf cells only) ──────────────────────────────────
  const leafCells = CELLS.filter(c => !c.is_group);
  const byId = {};

  const particles = leafCells.map(desc => {
    const col = gc(desc.species);

    // Random spawn scattered across the full canvas logical space
    const cx = Math.random() * CANVAS_W;
    const cy = Math.random() * CANVAS_H;

    // ELK target = bbox centre
    const tx = desc.bbox.x + desc.bbox.w / 2;
    const ty = desc.bbox.y + desc.bbox.h / 2;

    // Cell shape (drawn relative to its own origin → we move via .position)
    const gfx = new Graphics();
    gfx.roundRect(-desc.bbox.w / 2, -desc.bbox.h / 2, desc.bbox.w, desc.bbox.h, 8);
    gfx.fill({ color: col.fill, alpha: 0.85 });
    gfx.stroke({ color: col.stroke, width: 1.5 });
    gfx.zIndex = desc.z;
    gfx.position.set(cx, cy);
    root.addChild(gfx);

    // Label
    const lbl = new Text({
      text: desc.label,
      style: new TextStyle({
        fontSize: 10,
        fill: 0xFFFFFF,
        fontWeight: '500',
        fontFamily: 'system-ui',
        wordWrap: true,
        wordWrapWidth: Math.max(desc.bbox.w - 8, 20),
        align: 'center',
      }),
    });
    lbl.anchor.set(0.5);
    lbl.zIndex = desc.z + 1;
    lbl.position.set(cx, cy);
    root.addChild(lbl);

    const p = {
      desc,
      cx, cy,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      tx, ty,
      hw: desc.bbox.w / 2,
      hh: desc.bbox.h / 2,
      gfx, lbl,
    };
    byId[desc.cell_id] = p;
    return p;
  });

  // ── Adjacency list for topology edge springs ────────────────────────────
  const adj = {};
  for (const p of particles) adj[p.desc.cell_id] = [];
  for (const e of EDGES) {
    if (adj[e.source] !== undefined) adj[e.source].push(e.target);
    if (adj[e.target] !== undefined) adj[e.target].push(e.source);
  }

  // ── Ticker ─────────────────────────────────────────────────────────────
  let quietFrames = 0;
  let stopped = false;

  function tick() {
    if (stopped) return;

    const n = particles.length;

    // ── Compute forces ──────────────────────────────────────────────────
    for (let i = 0; i < n; i++) {
      const p = particles[i];
      let fx = 0, fy = 0;

      // 1. Restoring spring toward ELK target
      fx += PHYS.K_SPRING * (p.tx - p.cx);
      fy += PHYS.K_SPRING * (p.ty - p.cy);

      // 2. Pairwise repulsion
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const q = particles[j];
        const rx = p.cx - q.cx;
        const ry = p.cy - q.cy;
        const d2 = rx * rx + ry * ry + 0.01;
        const d  = Math.sqrt(d2);
        if (d < PHYS.REPULSION_R) {
          const mag = PHYS.REPULSION_K / d2;
          fx += (rx / d) * mag;
          fy += (ry / d) * mag;
        }
      }

      // 3. Topology edge springs (pull toward neighbours)
      const nbrs = adj[p.desc.cell_id] || [];
      for (const nid of nbrs) {
        const q = byId[nid];
        if (!q) continue;
        fx += PHYS.K_EDGE * (q.cx - p.cx);
        fy += PHYS.K_EDGE * (q.cy - p.cy);
      }

      // 4. Damped integrate
      p.vx = (p.vx + fx) * PHYS.DAMPING;
      p.vy = (p.vy + fy) * PHYS.DAMPING;
    }

    // ── Apply velocities ───────────────────────────────────────────────
    let maxV = 0;
    for (const p of particles) {
      p.cx += p.vx;
      p.cy += p.vy;
      p.gfx.position.set(p.cx, p.cy);
      p.lbl.position.set(p.cx, p.cy);
      const v = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (v > maxV) maxV = v;
    }

    // ── Redraw topology edges ──────────────────────────────────────────
    edgeGfx.clear();
    for (const e of EDGES) {
      const src = byId[e.source];
      const tgt = byId[e.target];
      if (!src || !tgt) continue;
      const mx = (src.cx + tgt.cx) / 2;
      edgeGfx.setStrokeStyle({ width: 1, color: 0x388BFD, alpha: 0.45 });
      edgeGfx.moveTo(src.cx, src.cy);
      edgeGfx.bezierCurveTo(mx, src.cy, mx, tgt.cy, tgt.cx, tgt.cy);
      edgeGfx.stroke();
    }

    // ── Convergence check ──────────────────────────────────────────────
    if (maxV < PHYS.CONVERGE_EPS) {
      quietFrames++;
      if (quietFrames >= PHYS.CONVERGE_FRAMES) {
        stopped = true;
        app.ticker.remove(tick);
        // Hard-snap onto ELK targets
        for (const p of particles) {
          p.gfx.position.set(p.tx, p.ty);
          p.lbl.position.set(p.tx, p.ty);
        }
        document.getElementById('info').textContent =
          `${CELLS.length} cells, ${EDGES.length} edges — ✓ Converged to ELK layout`;
        console.info('[pixi-cell-motion] converged');
      }
    } else {
      quietFrames = 0;
      document.getElementById('info').textContent =
        `⚡ Animating… maxV=${maxV.toFixed(2)} — ${particles.length} cells`;
    }
  }

  app.ticker.add(tick);

  // Return stop handle
  return function stopAnimate() {
    if (!stopped) {
      stopped = true;
      app.ticker.remove(tick);
    }
  };
}

initApp();
</script>
</body>
</html>
